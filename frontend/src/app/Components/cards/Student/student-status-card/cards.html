<div class="flex flex-row justify-between gap-5 font-bold">
    <div
        class=" card-container bg-gray-900/20 flex flex-col gap-1 p-4 py-8 rounded-2xl border-2 border-gray-700/30 w-2/4 sm:w-4/12 md:w-4/5/12 lg:w-3/12 2xl:w-3/12 max-h-32">
        <div class="flex flex-row h-5">
            <p class="text-gray-600 text-sm">Média Geral</p>

            <select name="Unit" id="Unit"
                class="min-h-fit max-h-3/4 max-w-16 ml-auto  text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 border appearance-none border-gray-700/80 bg-gray-900/20 rounded-xl text-center px-6 py-0.5 "
                [(ngModel)]="Unit">
                <option selected [value]="1">1ª</option>
                <option  [value]="2">2ª</option>
                <option  [value]="3">3ª</option>
                <option  [value]="4">4ª</option>
            </select>

            
        </div>
        <p class="text-green-600 text-3xl ml-2">{{ GeneralAverage }}</p>

        
    </div>

    <div
        class="card-container bg-gray-900/20 flex flex-col gap-1 p-4 py-8 rounded-2xl border-2 border-gray-700/30 w-2/4 sm:w-4/12 md:w-4/12 lg:w-3/12 2xl:w-3/12 max-h-32">
        
        <p class="text-gray-600 text-sm">Disciplinas</p>
        <p class="text-blue-600 text-3xl ml-2">{{ SubjectCount }}</p>
    </div>

    <div
        class="card-container bg-gray-900/20 flex flex-col gap-1 p-4 py-8 rounded-2xl border-2 border-gray-700/30 w-2/4 sm:w-4/12 md:w-4/5/12 lg:w-3/12 2xl:w-3/12 max-h-32">
        <p class="text-gray-600 text-sm">Trabalhos Pendentes</p>
        <p class="text-yellow-600 text-3xl ml-2">{{ TasksCount }}</p>
    </div>

    <div
        class="card-container bg-gray-900/20 flex flex-col gap-1 p-4 py-8 rounded-2xl border-2 border-gray-700/30 w-2/4 sm:w-4/12 md:w-4/12 lg:w-3/12 2xl:w-3/12 max-h-32">
        <p class="text-gray-600 text-sm">Próximas Provas</p>
        <p class="text-purple-600 text-3xl ml-2">{{ TestsCount }}</p>
    </div>
</div>
