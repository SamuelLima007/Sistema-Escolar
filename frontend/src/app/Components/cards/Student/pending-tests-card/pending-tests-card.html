<div
    class="card-container bg-gray-900/20 flex flex-col justify-end items-center gap-6 p-4 py-6 rounded-2xl border-2 border-gray-700/30 w-full min-h-135 font-bold">
    <div class="flex gap-2 w-full items-start">
        <lucide-angular size="32" [img]="NotebookText" class="my-icon text-purple-600 self-start"></lucide-angular>
        <p class="text-white text-xl">Próximas Provas</p>
    </div>

    <ng-container *ngFor="let pendingtest of viewpendingTests">
        <div class="bg-gray-600/20 p-4 w-full rounded-xl text-white flex flex-col gap-1.5 relative">
            <p class="text-lg">{{ pendingtest.name }}</p>
            <p class="text-gray-400/75 text-sm">{{pendingtest.subjectName}}</p>
            <p class="text-gray-400/75 text-sm">Prazo: {{ pendingtest.expirationDate | date: 'dd/MM/yyyy' }}</p>

        </div>
    </ng-container>

    <div class="flex flex-rows just items-center leading-none mt-auto ">
        <lucide-angular (click)="Paginator(-1)" size="24" [img]="ChevronLeft"
             class="hover:cursor-pointer transform transition-all hover:scale-95 hover:text-blue-300 my-icon text-blue-400 self-start"></lucide-angular>
        <p class="text-md  text-white rounded-xl p-1 px-2.5">{{CurrentPage + 1}}</p>
        <lucide-angular (click)="Paginator(1)" size="24" [img]="ChevronRight"
            class="hover:cursor-pointer transform transition-all hover:scale-95 hover:text-blue-300 my-icon text-blue-400 self-start"></lucide-angular>
    </div>


</div>
